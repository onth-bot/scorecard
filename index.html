<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ONTH Daily Scorecard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --black:    #080a0d;
  --dark:     #0d1017;
  --card:     #111520;
  --border:   #1e2535;
  --gold:     #00d4ff;
  --gold2:    #40e4ff;
  --gold-dim: #006e85;
  --gold-bg:  rgba(0,212,255,0.07);
  --gold-bd:  rgba(0,212,255,0.20);
  --white:    #e8edf5;
  --muted:    #4a5568;
  --green:    #22d98a;
  --green-bg: rgba(34,217,138,0.10);
  --green-bd: rgba(34,217,138,0.28);
  --red:      #ff4d6a;
  --red-bg:   rgba(255,77,106,0.10);
  --red-bd:   rgba(255,77,106,0.28);
  --amber:    #ffb020;
  --amber-bg: rgba(255,176,32,0.10);
  --amber-bd: rgba(255,176,32,0.28);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh;}

/* HERO */
.hero-card{position:relative;background:var(--dark);overflow:hidden;}
.hero-card::before{content:'';position:absolute;top:-60px;left:-80px;width:420px;height:420px;background:conic-gradient(from 200deg at 30% 40%,rgba(0,212,255,0.18) 0deg,rgba(0,212,255,0.04) 60deg,transparent 90deg);pointer-events:none;}
.hero-card::after{content:'';position:absolute;bottom:0;right:0;width:100%;height:3px;background:linear-gradient(90deg,transparent 0%,var(--gold) 40%,var(--gold2) 60%,transparent 100%);}
.hero-grid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);background-size:40px 40px;}
.hero-inner{position:relative;z-index:2;padding:32px 20px 28px;}
.hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.hero-badge{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);background:var(--gold-bg);border:1px solid var(--gold-bd);padding:5px 12px;border-radius:2px;}
.hero-date-badge{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);}
.hero-name-label{font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:4px;}
.hero-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(46px,13vw,88px);line-height:0.88;letter-spacing:0.02em;color:var(--white);text-shadow:0 2px 40px rgba(0,212,255,0.12);animation:nameReveal .7s ease both;margin-bottom:20px;}
.hero-score-row{display:grid;grid-template-columns:auto 1fr;gap:20px;align-items:center;}
.score-ring-wrap{position:relative;width:96px;height:96px;flex-shrink:0;}
.score-ring-wrap svg{width:96px;height:96px;transform:rotate(-90deg);filter:drop-shadow(0 0 12px rgba(0,212,255,0.3));}
.ring-track{fill:none;stroke:var(--border);stroke-width:7;}
.ring-fill{fill:none;stroke:var(--gold);stroke-width:7;stroke-linecap:round;stroke-dasharray:264;stroke-dashoffset:264;transition:stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1);}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-score{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1;color:var(--gold);letter-spacing:0.02em;}
.ring-label{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);}
.score-meta{display:flex;flex-direction:column;gap:8px;}
.score-rank-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(0,212,255,0.06);border:1px solid var(--gold-bd);border-radius:3px;padding:6px 12px;width:fit-content;}
.rank-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);line-height:1;}
.rank-label{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;line-height:1.3;}
.score-top-pct{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);}
.score-top-pct span{color:var(--gold);}
.no-data-banner{background:var(--red-bg);border:1px solid var(--red-bd);border-radius:4px;padding:10px 14px;font-family:'DM Mono',monospace;font-size:10px;color:var(--red);letter-spacing:0.06em;text-align:center;margin-top:12px;}

/* TAB SWITCHER */
.tab-bar{position:sticky;top:0;z-index:100;background:var(--dark);border-bottom:1px solid var(--border);display:flex;gap:0;}
.tab-btn{flex:1;padding:14px 10px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);background:none;border:none;cursor:pointer;transition:color .2s,border-color .2s;border-bottom:2px solid transparent;margin-bottom:-1px;display:flex;align-items:center;justify-content:center;gap:6px;}
.tab-btn:hover{color:var(--white);}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab-pane{display:none;}
.tab-pane.active{display:block;}

/* WRAPPER */
.wrapper{max-width:900px;margin:0 auto;padding:0 14px 80px;}

/* SECTION HEADER */
.section-header{display:flex;align-items:center;gap:12px;margin:32px 0 12px;}
.section-icon{width:32px;height:32px;flex-shrink:0;background:var(--gold-bg);border:1px solid var(--gold-bd);border-radius:4px;display:flex;align-items:center;justify-content:center;}
.section-icon svg{width:14px;height:14px;stroke:var(--gold);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.section-title-wrap{flex:1;}
.section-eyebrow{font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:1px;}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(22px,5vw,34px);line-height:1;letter-spacing:0.03em;color:var(--white);}
.section-line{flex:1;height:1px;background:var(--border);}

/* METRIC LIST */
.metric-list{background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.metric-row{display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid rgba(37,39,48,0.7);transition:background .12s;gap:12px;}
.metric-row:last-child{border-bottom:none;}
.metric-row:hover{background:rgba(0,212,255,0.03);}
.metric-name{flex:1;font-size:13px;font-weight:500;color:var(--white);min-width:0;}
.metric-name .sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;display:block;margin-top:1px;}
.metric-chip{font-family:'Bebas Neue',sans-serif;font-size:17px;line-height:1;padding:4px 14px;border-radius:3px;min-width:72px;text-align:center;letter-spacing:0.04em;flex-shrink:0;}
.metric-chip.green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);}
.metric-chip.amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd);}
.metric-chip.red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);}
.metric-chip.neutral{background:rgba(255,255,255,0.04);color:var(--white);border:1px solid var(--border);}

/* 2 COL */
.metric-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* ALERT */
.metric-alert{background:var(--red-bg);border:1px solid var(--red-bd);border-radius:4px;padding:10px 14px;font-size:11px;color:var(--red);font-family:'DM Mono',monospace;letter-spacing:0.04em;line-height:1.5;margin-top:8px;}
.metric-alert.good{background:var(--green-bg);border-color:var(--green-bd);color:var(--green);}

/* WEEKLY HERO ROW */
.weekly-hero{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:20px;display:flex;align-items:center;gap:20px;margin-bottom:4px;}
.weekly-ring-wrap{position:relative;width:80px;height:80px;flex-shrink:0;}
.weekly-ring-wrap svg{width:80px;height:80px;transform:rotate(-90deg);filter:drop-shadow(0 0 10px rgba(0,212,255,0.25));}
.weekly-ring-fill{fill:none;stroke:var(--gold);stroke-width:6;stroke-linecap:round;stroke-dasharray:220;stroke-dashoffset:220;transition:stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1);}
.weekly-ring-track{fill:none;stroke:var(--border);stroke-width:6;}
.weekly-ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.weekly-ring-score{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;color:var(--gold);}
.weekly-ring-label{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);}
.weekly-hero-meta{flex:1;}
.weekly-hero-week{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:4px;}
.weekly-hero-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:0.04em;color:var(--white);line-height:1;}
.weekly-hero-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.1em;margin-top:4px;}

/* WEEK SELECTOR */
.week-selector-wrap{margin-bottom:16px;}
.week-selector-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.week-selector{background:var(--card);border:1px solid var(--border);color:var(--white);font-family:'DM Mono',monospace;font-size:11px;padding:8px 12px;border-radius:4px;width:100%;cursor:pointer;appearance:none;-webkit-appearance:none;}
.week-selector:focus{outline:none;border-color:var(--gold-bd);}

/* FOCUS */
.focus-area{margin-top:8px;}
.focus-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:6px;padding:16px 18px;margin-bottom:8px;animation:fadeUp .4s ease both;}
.focus-card-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:0.06em;color:var(--gold);margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.focus-card p{font-size:13px;color:#c8c8d0;line-height:1.7;}
.all-good{background:var(--green-bg);border:1px solid var(--green-bd);border-radius:6px;padding:16px 20px;display:flex;align-items:center;gap:14px;}
.all-good-icon{font-size:28px;flex-shrink:0;line-height:1;display:flex;align-items:center;justify-content:center;}
.all-good-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.05em;color:var(--green);line-height:1;margin-bottom:3px;}
.all-good-sub{font-size:12px;color:rgba(34,217,138,0.8);line-height:1.5;}

/* WEEKLY NO DATA */
.weekly-no-data{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:32px 20px;text-align:center;}
.weekly-no-data-icon{color:var(--muted);margin-bottom:12px;opacity:0.4;display:flex;justify-content:center;}
.weekly-no-data-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.05em;color:var(--muted);margin-bottom:6px;}
.weekly-no-data-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.08em;}

/* FEEDBACK DETAILS */
.feedback-box{background:rgba(255,176,32,0.05);border:1px solid var(--amber-bd);border-radius:4px;padding:12px 14px;margin-top:8px;font-size:12px;color:#d4a847;line-height:1.7;font-family:'DM Sans',sans-serif;}
.feedback-box-label{font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:0.2em;text-transform:uppercase;color:var(--amber);margin-bottom:6px;}

/* YEARLY METRIC RANK GRID */
.metric-rank-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px;}
@media(max-width:700px){.metric-rank-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:440px){.metric-rank-grid{grid-template-columns:repeat(2,1fr);}}
.yearly-season-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(0,212,255,0.06);border:1px solid var(--gold-bd);border-radius:3px;padding:5px 14px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:4px;}

/* FOOTER */
.footer{border-top:1px solid var(--border);padding:28px 16px;text-align:center;color:var(--muted);font-size:11px;margin-top:40px;}
.footer-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.06em;color:var(--white);margin-bottom:4px;}
.footer-logo span{color:var(--gold);}

/* REVEAL */
.reveal{opacity:0;transform:translateY(12px);transition:opacity .4s ease,transform .4s ease;}
.reveal.visible{opacity:1;transform:none;}

/* RESPONSIVE */
@media(max-width:560px){
  .metric-2col{grid-template-columns:1fr;}
  .hero-inner{padding:24px 16px 22px;}
  .metric-chip{font-size:15px;min-width:60px;padding:3px 10px;}
  .metric-row{padding:10px 12px;}
  .metric-name{font-size:12px;}
  .wrapper{padding:0 10px 70px;}
  .weekly-hero{flex-direction:column;text-align:center;}
}
@media(min-width:700px){
  .hero-inner{padding:40px 32px 36px;}
  .wrapper{padding:0 24px 80px;}
  .metric-row{padding:13px 20px;}
  .metric-chip{font-size:19px;min-width:80px;}
  .metric-name{font-size:14px;}
}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
@keyframes nameReveal{from{opacity:0;transform:translateX(-12px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>

<div class="hero-card">
  <div class="hero-grid"></div>
  <div class="hero-inner">
    <div class="hero-top">
      <div class="hero-badge">DSJ5 · Scorecard</div>
      <div class="hero-date-badge" id="heroDt">LOADING...</div>
    </div>
    <div class="hero-name-label">Driver</div>
    <div class="hero-name" id="heroName">Loading...</div>
    <div class="hero-score-row" id="heroScoreRow" style="display:none;">
      <div class="score-ring-wrap">
        <svg viewBox="0 0 96 96">
          <circle class="ring-track" cx="48" cy="48" r="42"/>
          <circle class="ring-fill" id="ringFill" cx="48" cy="48" r="42"/>
        </svg>
        <div class="ring-center">
          <div class="ring-score" id="ringScore">--</div>
          <div class="ring-label">Score</div>
        </div>
      </div>
      <div class="score-meta">
        <div class="score-rank-pill" id="rankPill" style="display:none;">
          <div class="rank-num" id="rankNum">--</div>
          <div class="rank-label">Rank<br>Overall</div>
        </div>
        <div class="score-top-pct" id="topPct"></div>
      </div>
    </div>
    <div id="noDataBanner" style="display:none;" class="no-data-banner">
      No data found · Check back after routes are completed
    </div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="daily" onclick="switchTab('daily')">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
    Daily
  </button>
  <button class="tab-btn" data-tab="weekly" onclick="switchTab('weekly')">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
    Weekly
  </button>
  <button class="tab-btn" data-tab="yearly" onclick="switchTab('yearly')">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
    2026
  </button>
</div>

<div class="tab-pane active" id="tab-daily">
<div class="wrapper">
  <div class="reveal" id="dailyContent"></div>
</div>
</div>

<div class="tab-pane" id="tab-weekly">
<div class="wrapper">

  <div class="reveal" id="weeklyContent">
    </div>

</div>
</div>

<div class="tab-pane" id="tab-yearly">
<div class="wrapper">
  <div class="reveal" id="yearlyContent"></div>
</div>
</div>

<footer class="footer">
  <div class="footer-logo">On The <span>Level</span> Logistics</div>
  <p>825 N Clovis Ave &nbsp;&middot;&nbsp; Fresno, CA &nbsp;&middot;&nbsp; DSJ5</p>
  <p style="margin-top:10px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;color:#333;">ONTH INTERNAL USE ONLY</p>
</footer>

<script>
var API_URL = 'https://script.google.com/macros/s/AKfycbxb9ZQAxdZ9JeDi60V4Qwkhdn4gj3DTKzbabDfSH-0wUUcEKSIR3m_liDjErk4qf-X59Q/exec';
var _cachedData = null;

// ── TAB SWITCHER ─────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.tab === tab); });
  document.querySelectorAll('.tab-pane').forEach(function(p){ p.classList.toggle('active', p.id === 'tab-' + tab); });
  reObserve();
}

// ── INIT ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  var params = new URLSearchParams(window.location.search);
  var driver = (params.get('driver') || '').trim();
  
  document.title = driver ? driver + ' · ONTH Scorecard' : 'ONTH Daily Scorecard';

  if (!driver) {
    document.getElementById('heroName').textContent = 'No Driver';
    document.getElementById('noDataBanner').style.display = 'block';
    setAllEmpty('No driver specified — use ?driver=First+Last');
    renderWeeklyNoData('No driver specified');
    renderYearlyNoData('No driver specified');
    return;
  }
  document.getElementById('heroName').textContent = driver;
  loadData(driver);
});

function formatDisplayDate(dateString) {
  if (!dateString) return '';
  var d = new Date(dateString);
  if (isNaN(d)) return dateString;
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }).toUpperCase();
}

function loadData(driver) {
  fetch(API_URL + '?driver=' + encodeURIComponent(driver))
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(d){
      _cachedData = d;
      var daily  = d.daily  || d;
      var weekly = d.weekly || null;
      var yearly = d.yearly || null;
      
      // Update Hero Date dynamically
      if (daily.date) {
        document.getElementById('heroDt').textContent = formatDisplayDate(daily.date);
      } else {
        document.getElementById('heroDt').textContent = 'NO RECENT SHIFT';
      }

      renderDaily(daily);
      renderWeekly(weekly);
      renderYearly(yearly);
    })
    .catch(function(e){
      document.getElementById('heroDt').textContent = 'ERROR';
      document.getElementById('noDataBanner').style.display = 'block';
      setAllEmpty('Failed to load: ' + e.message);
      renderWeeklyNoData('Failed to load data');
      renderYearlyNoData('Failed to load data');
    });
}

// ── DAILY RENDER ─────────────────────────────────────────────
function renderDaily(d) {
  var el = document.getElementById('dailyContent');

  if (!d.dcr && !d.pod && !d.sph) {
    document.getElementById('noDataBanner').style.display = 'block';
  }

  // Update hero ring
  if (d.overall != null) {
    document.getElementById('heroScoreRow').style.display = 'grid';
    var score = parseFloat(d.overall);
    document.getElementById('ringScore').textContent = score.toFixed(2);
    var pct = Math.min(Math.max(score / 100, 0), 1);
    setTimeout(function(){ document.getElementById('ringFill').style.strokeDashoffset = 264 - (pct * 264); }, 200);
    if (d.rank && d.total) {
      document.getElementById('rankPill').style.display = 'flex';
      document.getElementById('rankNum').textContent = d.rank + ' / ' + d.total;
      var topPct = Math.round((parseInt(d.rank) / parseInt(d.total)) * 100);
      document.getElementById('topPct').innerHTML = 'Top <span>' + topPct + '%</span> of drivers';
    }
  }

  var html = '';

  // Date banner
  var displayDate = d.date ? formatDisplayDate(d.date) : 'NO RECENT SHIFT FOUND';
  html += '<div style="background:rgba(0,212,255,0.04);border:1px solid var(--gold-bd);border-radius:6px;padding:12px 16px;display:flex;align-items:center;gap:14px;margin-top:24px;margin-bottom:12px;">' +
    '<div style="color:var(--gold);display:flex;"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></div>' +

  html += sectionHeader('CDF Detail — Season Totals', '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>', true);
  html += buildListHtml([
    { name:'CDF DPMO Avg', sub:'Defects Per Million', val:y.cdfDpmo, fmt:'dec', neutral:true },
    { name:'Mishandled Package', sub:'Season Total', val:y.mishandled, fmt:'num', neutral:true },
    { name:'Unprofessional', sub:'Season Total', val:y.unprofessional, fmt:'num', neutral:true },
    { name:'Did Not Follow Instructions', sub:'Season Total', val:y.noFollowInstructions, fmt:'num', neutral:true },
    { name:'Wrong Address', sub:'Season Total', val:y.wrongAddress, fmt:'num', neutral:true },
    { name:'Never Received Delivery', sub:'Season Total', val:y.neverReceived, fmt:'num', neutral:true },
    { name:'Received Wrong Item', sub:'Season Total', val:y.wrongItem, fmt:'num', neutral:true },
  ], false);

  // ── SECTION 3: DSB SUMS + DPMO ───────────────────────────
  html += sectionHeader('DSB Detail — Season Totals', '<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>', true);
  html += buildListHtml([
    { name:'DSB DPMO Avg', sub:'Delivery Success Behaviors', val:y.dsb, fmt:'dec', neutral:true },
    { name:'Simultaneous Deliveries', sub:'Season Total', val:y.simultaneous, fmt:'num', neutral:true },
    { name:'Delivered > 50m', sub:'Season Total', val:y.delivered50m, fmt:'num', neutral:true },
    { name:'Incorrect Scan (Attended)', sub:'Season Total', val:y.incorrectAttended, fmt:'num', neutral:true },
    { name:'Incorrect Scan (Unattended)', sub:'Season Total', val:y.incorrectUnattended, fmt:'num', neutral:true },
    { name:'No POD on Delivery', sub:'Season Total', val:y.noPod, fmt:'num', neutral:true },
    { name:'Scanned Not Delivered', sub:'Season Total', val:y.scannedNotDelivered, fmt:'num', neutral:true },
  ], false);

  // ── WEEKLY HISTORY TABLE ──────────────────────────────────
  var hist = y.weeklyHistory || [];
  if (hist.length) {
    html += '<div class="section-header" style="margin-top:32px;">' +
      '<div class="section-icon"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></div>' +
      '<div class="section-title-wrap"><div class="section-title">Week-by-Week Query</div></div>' +
      '<div class="section-line"></div></div>';
    html += '<div style="overflow-x:auto;border-radius:6px;border:1px solid var(--border);">' +
      '<table style="width:100%;border-collapse:collapse;background:var(--card);font-family:\'DM Mono\',monospace;font-size:10px;">' +
      '<thead><tr style="border-bottom:1px solid var(--border);">' +
      '<th style="padding:8px 12px;text-align:left;color:var(--gold);letter-spacing:0.15em;text-transform:uppercase;white-space:nowrap;font-weight:500;">Week</th>' +
      '<th style="padding:8px 12px;text-align:center;color:var(--gold);letter-spacing:0.15em;text-transform:uppercase;white-space:nowrap;font-weight:500;">Overall</th>' +
      '<th style="padding:8px 12px;text-align:center;color:var(--gold);letter-spacing:0.15em;text-transform:uppercase;white-space:nowrap;font-weight:500;">SPH</th>' +
      '<th style="padding:8px 12px;text-align:center;color:var(--gold);letter-spacing:0.15em;text-transform:uppercase;white-space:nowrap;font-weight:500;">POD</th>' +
      '<th style="padding:8px 12px;text-align:center;color:var(--gold);letter-spacing:0.15em;text-transform:uppercase;white-space:nowrap;font-weight:500;">DCR</th>' +
      '<th style="padding:8px 12px;text-align:center;color:var(--gold);letter-spacing:0.15em;text-transform:uppercase;white-space:nowrap;font-weight:500;">DSB DPMO</th>' +
      '<th style="padding:8px 12px;text-align:center;color:var(--gold);letter-spacing:0.15em;text-transform:uppercase;white-space:nowrap;font-weight:500;">CDF DPMO</th>' +
      '</tr></thead><tbody>';
    hist.forEach(function(row, idx) {
      var bg = idx % 2 === 0 ? 'background:rgba(255,255,255,0.01);' : '';
      function fmtCell(v, isPct) {
        if (v == null || v === '') return '<td style="padding:7px 12px;text-align:center;color:var(--muted);">—</td>';
        var n = parseFloat(v);
        if (isNaN(n)) return '<td style="padding:7px 12px;text-align:center;color:var(--muted);">—</td>';
        var display = isPct ? ((n > 1 ? n : n * 100).toFixed(2) + '%') : n.toFixed(2);
        return '<td style="padding:7px 12px;text-align:center;color:var(--white);">' + display + '</td>';
      }
      html += '<tr style="border-bottom:1px solid rgba(30,37,53,0.6);' + bg + '">' +
        '<td style="padding:7px 12px;color:var(--gold);white-space:nowrap;">' + esc(row.week) + '</td>' +
        fmtCell(row.overall, false) +
        fmtCell(row.sph, false) +
        fmtCell(row.pod, true) +
        fmtCell(row.dcr, true) +
        fmtCell(row.dsb, false) +
        fmtCell(row.cdfDpmo, false) +
        '</tr>';
    });
    html += '</tbody></table></div>';
  }

  el.innerHTML = html;
  reObserve();
}

function renderYearlyNoData(msg) {
  document.getElementById('yearlyContent').innerHTML =
    '<div class="weekly-no-data" style="margin-top:32px;">' +
    '<div class="weekly-no-data-icon"><svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg></div>' +
    '<div class="weekly-no-data-title">No 2026 Data</div>' +
    '<div class="weekly-no-data-sub">' + esc(msg) + '</div></div>';
}

// ── HTML BUILDER HELPERS ──────────────────────────────────────
function sectionHeader(title, iconPath, fullWidth) {
  return '<div class="section-header">' +
    '<div class="section-icon"><svg viewBox="0 0 24 24">' + iconPath + '</svg></div>' +
    '<div class="section-title-wrap"><div class="section-title">' + esc(title) + '</div></div>' +
    (fullWidth ? '<div class="section-line"></div>' : '') +
    '</div>';
}

function buildListHtml(items, zeroFilter, successTitle, successMsg) {
  var filtered = items;
  if (zeroFilter) {
    filtered = items.filter(function(item) {
      if (item.val == null || item.val === '') return false;
      var n = parseFloat(item.val);
      return !isNaN(n) && n > 0;
    });
    if (!filtered.length) {
      return '<div class="metric-list"><div class="metric-row" style="gap:14px;">' +
        '<div style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;background:var(--green-bg);border:1px solid var(--green-bd);border-radius:4px;color:var(--green);flex-shrink:0;">' +
        '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>' +
        '<div><div style="font-family:\'Bebas Neue\',sans-serif;font-size:17px;letter-spacing:.05em;color:var(--green);">' + esc(successTitle || 'No Issues Recorded') + '</div>' +
        '<div style="font-family:\'DM Mono\',monospace;font-size:10px;color:rgba(34,217,138,0.6);letter-spacing:.08em;margin-top:2px;">' + esc(successMsg || 'Great job — keep it up!') + '</div></div>' +
        '</div></div>';
    }
  }
  return '<div class="metric-list">' + filtered.map(function(item) {
    var val = item.val;
    var display = '—';
    var cls = 'neutral';
    if (val != null && val !== '') {
      var n = parseFloat(val);
      if (!isNaN(n)) {
        if (item.fmt === 'pct') {
          var pv = n > 1 ? n : n * 100;
          display = pv.toFixed(2) + '%';
          if (!item.neutral) cls = pv >= item.thresholds[0] ? 'green' : pv >= item.thresholds[1] ? 'amber' : 'red';
        } else if (item.fmt === 'dec') {
          display = n.toFixed(2);
          if (!item.neutral) {
            if (item.zero) cls = n === 0 ? 'green' : n <= 0.5 ? 'amber' : 'red';
            else cls = n >= item.thresholds[0] ? 'green' : n >= item.thresholds[1] ? 'amber' : 'red';
          }
        } else {
          display = String(Math.round(n));
        }
      }
    }
    return '<div class="metric-row">' +
      '<div class="metric-name">' + esc(item.name) + (item.sub ? '<span class="sub">' + esc(item.sub) + '</span>' : '') + '</div>' +
      '<div class="metric-chip ' + cls + '">' + display + '</div></div>';
  }).join('') + '</div>';
}

function buildList(id, items, zeroFilter, successTitle, successMsg) {
  document.getElementById(id).innerHTML = buildListHtml(items, zeroFilter, successTitle, successMsg);
}

// ── FOCUS CARDS ───────────────────────────────────────────────
var FOCUS_ICONS = {
  sph:    '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
  dcr:    '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>',
  pod:    '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>',
  shield: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
  dsb:    '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
  cdf:    '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
  trophy: '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 21 12 17 16 21"/><line x1="12" y1="17" x2="12" y2="11"/><path d="M7 4H4a2 2 0 0 0-2 2v2a4 4 0 0 0 4 4h.1M17 4h3a2 2 0 0 1 2 2v2a4 4 0 0 1-4 4h-.1M7 4h10v6a5 5 0 0 1-10 0V4z"/></svg>',
};

function iconWrap(svg) {
  return '<span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;background:var(--gold-bg);border:1px solid var(--gold-bd);border-radius:3px;flex-shrink:0;color:var(--gold);">'+svg+'</span>';
}

function renderFocus(d, areaId, cardsId) {
  var areas = [];
  
  // Handle keys for both Daily and Weekly objects
  var podVal = d.pod;
  var dcrVal = d.dcr;
  var sphVal = d.sph != null ? d.sph : d.weeklySph; 
  
  if (podVal != null && (parseFloat(podVal)>1?parseFloat(podVal):parseFloat(podVal)*100) < 99.5)
    areas.push({icon:FOCUS_ICONS.pod,title:'Photo on Delivery (POD)',text:'Your photos need to meet Amazon\'s quality standards. Step back to frame the package clearly in a safe, recognizable location. Avoid blurry images, poor lighting, people in frame, shadows, reflections, or anything showing addresses or license plates. Never photograph from inside the van or while holding the package. Always review before submitting.'});
  if (dcrVal != null && (parseFloat(dcrVal)>1?parseFloat(dcrVal):parseFloat(dcrVal)*100) < 99.5)
    areas.push({icon:FOCUS_ICONS.dcr,title:'Delivery Completion Rate (DCR)',text:'This measures successful deliveries or valid returns. Always attempt delivery first. Call the customer and let it ring at least 12 seconds, send a text if no answer, and contact Driver Support when needed. Log every attempt immediately and use the correct RTS codes.'});
  if (sphVal != null && parseFloat(sphVal) < 20)
    areas.push({icon:FOCUS_ICONS.sph,title:'Stops Per Hour (SPH)',text:'The minimum requirement is 20 stops per hour. To improve efficiency, organize your next bag in the cabin, minimize time in the van at each stop, and move purposefully but safely between the van and delivery point.'});
  
  var safetySum = (parseFloat(d.seatbelt)||0)+(parseFloat(d.speeding)||0)+(parseFloat(d.distractions)||0)+(parseFloat(d.following)||0)+(parseFloat(d.signViolations)||0);
  if (safetySum > 0)
    areas.push({icon:FOCUS_ICONS.shield,title:'Safe Driving',text:'Amazon monitors speeding, seatbelt use, phone distractions, tailgating, and rolling stops. Always buckle up properly, avoid phone use unless mounted, maintain safe following distance, obey all traffic signs, and never rush through lights or stop signs.'});
  
  var dsbSum = (parseFloat(d.simultaneous)||0)+(parseFloat(d.delivered50m)||0)+(parseFloat(d.incorrectAttended)||0)+(parseFloat(d.incorrectUnattended)||0)+(parseFloat(d.noPod)||0)+(parseFloat(d.scannedNotDelivered)||0);
  if (dsbSum > 0)
    areas.push({icon:FOCUS_ICONS.dsb,title:'Delivery Success Behaviors (DSB)',text:'This tracks errors that result in \'package not received\' reports. Always verify the address, especially at group stops. Deliver within the geopin zone, use the proper scan type (attended or unattended), and capture clear PODs. Only mark deliveries as Receptionist or Household Member when genuinely applicable.'});
  
  var cdfSum = (parseFloat(d.mishandled)||0)+(parseFloat(d.unprofessional)||0)+(parseFloat(d.noFollowInstructions)||0)+(parseFloat(d.wrongAddress)||0)+(parseFloat(d.neverReceived)||0)+(parseFloat(d.wrongItem)||0);
  if (cdfSum > 0)
    areas.push({icon:FOCUS_ICONS.cdf,title:'Customer Delivery Feedback (CDF)',text:'This reflects complaints about issues under your control: wrong address, ignored instructions, or unprofessional conduct. Always verify addresses, follow delivery notes precisely, and place packages in secure, discreet locations. Stay professional: wear your uniform, keep music volume low, and avoid personal calls during deliveries. When uncertain, contact the customer or Driver Support.'});

  var fa = document.getElementById(areaId);
  var fc = document.getElementById(cardsId);
  
  if (!fa || !fc) return;
  fa.style.display = 'block';
  
  if (!areas.length) {
    fc.innerHTML = '<div class="all-good">' +
      '<div class="all-good-icon" style="color:var(--green);">'+FOCUS_ICONS.trophy+'</div>' +
      '<div><div class="all-good-title">Outstanding Work</div>' +
      '<div class="all-good-sub">You\'re excelling across all metrics—quality photos, strong pace, completed deliveries, safe driving, and positive customer interactions. Keep up the excellent work.</div></div></div>';
    return;
  }
  
  fc.innerHTML = areas.map(function(a,i){
    return '<div class="focus-card" style="animation-delay:'+(i*.08)+'s">' +
      '<div class="focus-card-title">'+iconWrap(a.icon)+'&nbsp;'+esc(a.title)+'</div>' +
      '<p>'+esc(a.text)+'</p></div>';
  }).join('');
}

function setAllEmpty(msg) {
  var el = document.getElementById('dailyContent');
  if (el) el.innerHTML = '<div class="metric-row" style="color:var(--muted);font-family:\'DM Mono\',monospace;font-size:10px;margin-top:24px;">'+esc(msg)+'</div>';
}
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── INTERSECTION OBSERVER ─────────────────────────────────────
var obs = new IntersectionObserver(function(e){
  e.forEach(function(x){ if(x.isIntersecting) x.target.classList.add('visible'); });
},{threshold:0.08});

function reObserve() {
  document.querySelectorAll('.reveal').forEach(function(s){
    if (!s.classList.contains('visible')) obs.observe(s);
  });
}
document.querySelectorAll('.reveal').forEach(function(s){ obs.observe(s); });
</script>
